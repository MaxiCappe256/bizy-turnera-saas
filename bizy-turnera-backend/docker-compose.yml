services:
  db:
    image: postgres:15
    container_name: saas_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
